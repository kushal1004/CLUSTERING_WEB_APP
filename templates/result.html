<!doctype html>
<html lang="en">
  <head>
    <title>Results</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/result.css" />
  </head>

  <body>
    <div class="container">
      <div class="card">
        <h2>📊 Clustering Results</h2>

        <div class="highlight">Best Clusters: <b>{{ k }}</b></div>

        <div class="highlight">Best Algorithm: <b>{{ algo }}</b></div>
      </div>

      <div class="card">
        <h3>📈 Silhouette Scores</h3>

        {% for name, score in scores.items() %}
        <div class="score-item">
          <span>{{ name }}</span>
          <span>{{ "%.2f"|format(score) }}</span>
        </div>
        {% endfor %}
      </div>

      <div class="grid">
        <div class="card">
          <h3>K-Means</h3>
          <img src="/static/plots/kmeans.png" />
        </div>

        <div class="card">
          <h3>Hierarchical</h3>
          <img src="/static/plots/hierarchical.png" />
        </div>

        <div class="card">
          <h3>DBSCAN</h3>
          <img src="/static/plots/dbscan.png" />
        </div>
      </div>

      <div class="card">
        <h3>📉 Elbow Method</h3>
        <img src="/static/plots/elbow.png" />
      </div>

      <div class="back-btn">
        <a href="/">⬅ Back</a>
      </div>
    </div>
  </body>
</html>
