<!DOCTYPE html>
<html lang="en">
<head>
    <title>Clustering Results</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/result.css') }}">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>Clustering Dashboard</h1>
        <p>Visual comparison of clustering algorithms</p>
    </div>

    <!-- KPI -->
    <div class="kpi-grid">
        <div class="kpi">
            <h4>Best Clusters</h4>
            <h2>{{ k }}</h2>
        </div>

        <div class="kpi highlight">
            <h4>Best Algorithm</h4>
            <h2>{{ algo }}</h2>
        </div>

        <div class="kpi">
            <h4>Total Models</h4>
            <h2>3</h2>
        </div>
    </div>

    <!-- SCORE -->
    <div class="card">
        <h3>Model Performance (Silhouette Score)</h3>

        {% for name, score in scores.items() %}
        <div class="bar">
            <span>{{ name }}</span>
            <div class="progress">
                <div class="fill" style="width: {{ score * 100 }}%"></div>
            </div>
            <span>{{ "%.2f"|format(score) }}</span>
        </div>
        {% endfor %}
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab active" onclick="showTab(event,'kmeans')">K-Means</button>
        <button class="tab" onclick="showTab(event,'hier')">Hierarchical</button>
        <button class="tab" onclick="showTab(event,'db')">DBSCAN</button>
        <button class="tab" onclick="showTab(event,'elbow')">Elbow</button>
    </div>

    <!-- TAB CONTENT -->
    <div class="tab-content active" id="kmeans">
        <div class="graph-box">
            <img src="/static/plots/kmeans.png" onclick="openModal(this)">
            <div class="actions">
                <button class="download-btn" onclick="downloadImage('/static/plots/kmeans.png')">⬇ Download</button>
            </div>
        </div>
    </div>

    <div class="tab-content" id="hier">
        <div class="graph-box">
            <img src="/static/plots/hierarchical.png" onclick="openModal(this)">
            <div class="actions">
                <button class="download-btn" onclick="downloadImage('/static/plots/hierarchical.png')">⬇ Download</button>
            </div>
        </div>
    </div>

    <div class="tab-content" id="db">
        <div class="graph-box">
            <img src="/static/plots/dbscan.png" onclick="openModal(this)">
            <div class="actions">
                <button class="download-btn" onclick="downloadImage('/static/plots/dbscan.png')">⬇ Download</button>
            </div>
        </div>
    </div>

    <div class="tab-content" id="elbow">
        <div class="graph-box">
            <img src="/static/plots/elbow.png" onclick="openModal(this)">
            <div class="actions">
                <button class="download-btn" onclick="downloadImage('/static/plots/elbow.png')">⬇ Download</button>
            </div>
        </div>
    </div>

    <!-- BACK -->
    <div class="back">
        <a href="/">⬅ Back</a>
    </div>

</div>

<!-- FULLSCREEN MODAL -->
<div id="imgModal" class="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script>
function showTab(evt,id){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    evt.currentTarget.classList.add('active');
    document.getElementById(id).classList.add('active');
}

function openModal(img){
    document.getElementById("imgModal").style.display="flex";
    document.getElementById("modalImg").src=img.src;
}

function closeModal(){
    document.getElementById("imgModal").style.display="none";
}

function downloadImage(url){
    const a=document.createElement("a");
    a.href=url;
    a.download="graph.png";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}
</script>

</body>
</html>
