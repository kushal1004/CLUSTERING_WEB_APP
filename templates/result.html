<!DOCTYPE html>
<html lang="en">
<head>
    <title>Results</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #1d2b64, #f8cdda);
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        h2, h3 {
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        img {
            width: 100%;
            border-radius: 15px;
            margin-top: 10px;
        }

        .highlight {
            font-size: 20px;
            text-align: center;
            margin: 10px 0;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
        }

        .back-btn a {
            text-decoration: none;
            color: white;
            background: #ff416c;
            padding: 10px 20px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .back-btn a:hover {
            background: #ff4b2b;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">
        <h2>📊 Clustering Results</h2>

        <div class="highlight">
            Best Clusters: <b>{{ k }}</b>
        </div>

        <div class="highlight">
            Best Algorithm: <b>{{ algo }}</b>
        </div>
    </div>

    <div class="card">
        <h3>📈 Silhouette Scores</h3>

        {% for name, score in scores.items() %}
        <div class="score-item">
            <span>{{ name }}</span>
            <span>{{ "%.2f"|format(score) }}</span>
        </div>
        {% endfor %}
    </div>

    <div class="grid">
        <div class="card">
            <h3>K-Means</h3>
            <img src="/static/plots/kmeans.png">
        </div>

        <div class="card">
            <h3>Hierarchical</h3>
            <img src="/static/plots/hierarchical.png">
        </div>

        <div class="card">
            <h3>DBSCAN</h3>
            <img src="/static/plots/dbscan.png">
        </div>
    </div>

    <div class="card">
        <h3>📉 Elbow Method</h3>
        <img src="/static/plots/elbow.png">
    </div>

    <div class="back-btn">
        <a href="/">⬅ Back</a>
    </div>

</div>

</body>
</html>
