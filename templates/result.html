<!DOCTYPE html>
<html>
<head>
    <title>Clustering Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">

    <div class="card shadow p-4 mb-4">
        <h3 class="text-center">Clustering Analysis Result</h3>
        <p><b>Best Number of Clusters:</b> {{ k }}</p>
        <p><b>Best Algorithm:</b> {{ algo }}</p>

        <hr>
        <h5>Silhouette Scores:</h5>
        <ul class="list-group">
            {% for name, score in scores.items() %}
                <li class="list-group-item d-flex justify-content-between">
                    <span>{{ name }}</span>
                    <span>{{ "%.2f"|format(score) }}</span>
                </li>
            {% endfor %}
        </ul>
    </div>

    <div class="row">
        <div class="col-md-4 text-center">
            <h5>K-Means</h5>
            <img src="/static/plots/kmeans.png" class="img-fluid rounded shadow">
        </div>
        <div class="col-md-4 text-center">
            <h5>Hierarchical</h5>
            <img src="/static/plots/hierarchical.png" class="img-fluid rounded shadow">
        </div>
        <div class="col-md-4 text-center">
            <h5>DBSCAN</h5>
            <img src="/static/plots/dbscan.png" class="img-fluid rounded shadow">
        </div>
    </div>

    <div class="mt-5 text-center">
        <h4>Elbow Method</h4>
        <img src="/static/plots/elbow.png" class="img-fluid rounded shadow">
    </div>

</div>
</body>
</html>
