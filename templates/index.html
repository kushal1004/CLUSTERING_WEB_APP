<!DOCTYPE html>
<html lang="en">
<head>
    <title>Clustering Analyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
        }

        input[type="file"] {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🚀 Clustering Analyzer</h2>
    <p>Upload your dataset & compare ML clustering algorithms</p>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="dataset" accept=".csv" required>
        <button type="submit">Analyze Dataset</button>
    </form>

    <div class="footer">
        Final Year Project • Machine Learning
    </div>
</div>

</body>
</html>
