<!DOCTYPE html>
<html lang="en">
<head>
    <title>Clustering Analyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="bg-blur"></div>

<div class="container">

    <div class="header">
        <h1>Clustering Analyzer</h1>
        <p>Powerful ML insights in seconds</p>
    </div>

    <div class="card">

        <form action="/upload" method="post" enctype="multipart/form-data" id="form">

            <div class="drop-zone" id="dropZone">
                <input type="file" name="dataset" id="fileInput" accept=".csv" hidden required>

                <div class="dz-content">
                    <div class="icon">⬆</div>
                    <h3>Drop your dataset</h3>
                    <p>or click to browse (.csv only)</p>
                </div>
            </div>

            <div class="file-info" id="fileInfo"></div>

            <button class="btn">
                Analyze Dataset
            </button>

        </form>

    </div>

</div>

<!-- Loading Overlay -->
<div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Analyzing your data...</p>
</div>

<script>
const dropZone = document.getElementById("dropZone");
const input = document.getElementById("fileInput");
const fileInfo = document.getElementById("fileInfo");
const form = document.getElementById("form");
const loader = document.getElementById("loader");

dropZone.onclick = () => input.click();

dropZone.ondragover = (e) => {
    e.preventDefault();
    dropZone.classList.add("active");
};

dropZone.ondragleave = () => dropZone.classList.remove("active");

dropZone.ondrop = (e) => {
    e.preventDefault();
    input.files = e.dataTransfer.files;
    updateFile();
};

input.onchange = updateFile;

function updateFile() {
    const file = input.files[0];
    if (!file.name.endsWith(".csv")) {
        fileInfo.innerHTML = "❌ Only CSV allowed";
        fileInfo.style.color = "red";
        return;
    }

    fileInfo.innerHTML = "✔ " + file.name;
    fileInfo.style.color = "#22c55e";
}

form.onsubmit = () => {
    loader.style.display = "flex";
};
</script>

</body>
</html>
